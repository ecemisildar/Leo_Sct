image_processor:
  ros__parameters:
    # Depth-based obstacle detection tuning for RealSense
    # Conservative real-world profile: detect earlier, clear later.
    enter_thresh: 0.80
    exit_thresh: 1.05
    emergency_thresh: 0.45
    # Side ROIs: increased to react earlier to walls/objects on left/right.
    side_enter_thresh: 0.95
    side_exit_thresh: 1.20
    left_enter_thresh: 0.95
    right_enter_thresh: 0.95
    left_exit_thresh: 1.20
    right_exit_thresh: 1.20

    # Depth range in meters
    min_depth: 0.20
    max_depth: 6.00

    # ROI / robustness tuning (conservative)
    stride: 1
    percentile: 0.05
    near_count_k: 4
    valid_count_min: 60
    crop_y0_frac: 0.25
    crop_y1_frac: 0.55
    front_gain: 1.40

    # Stability / responsiveness (conservative)
    hold_ms: 250
    clear_skip: 1
    safe_frames_required: 5
