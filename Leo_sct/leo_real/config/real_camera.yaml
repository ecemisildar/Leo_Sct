image_processor:
  ros__parameters:
    # Depth-based obstacle detection tuning for RealSense (FINAL tuned values)
    enter_thresh: 0.75
    exit_thresh: 0.95
    emergency_thresh: 0.45

    # Depth range in meters
    min_depth: 0.20
    max_depth: 6.00

    # ROI / robustness tuning (REAL CAMERA tuned)
    stride: 1
    percentile: 0.05
    near_count_k: 6
    valid_count_min: 120
    crop_y0_frac: 0.45
    crop_y1_frac: 0.75
    front_gain: 1.40   # keep unless you later want narrower front

    # Stability / responsiveness (REAL CAMERA tuned)
    hold_ms: 80
    clear_skip: 3
    safe_frames_required: 2

    # ArUco detection (optional)
    marker_enabled: true
    marker_label: marker
    aruco_dictionary_id: 0  # DICT_6X6_250
    aruco_corner_refine: true
    aruco_try_inverted: true
    aruco_window_radius: 2
    aruco_min_perimeter_rate: 0.01
    aruco_adaptive_win_min: 3
    aruco_adaptive_win_max: 53
    aruco_adaptive_win_step: 10
    aruco_corner_refine_win: 7
    aruco_polygonal_accuracy: 0.05

    # Legacy params (safe to keep)
    marker_min: 80
    marker_ratio: 1.6
    marker_pixel_ratio: 0.002
    marker_stride: 2
    marker_hold_ms: 2000
    marker_distance_min_count: 6
    marker_depth_max_age_ms: 200
